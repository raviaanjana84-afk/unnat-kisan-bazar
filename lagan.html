.vachan-card {
    background: #fff;
    border: 2px solid #8b0000;
    padding: 30px;
    border-radius: 20px;
    height: 100%;
    transition: 0.3s;
}
.vachan-card:hover { transform: rotate(2deg); background: #8b0000; color: gold; }
.gita-quote { font-size: 0.9rem; font-style: italic; color: #555; }
