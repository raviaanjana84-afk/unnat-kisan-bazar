<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>The Royal Saga | Rahul & Anjali</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css">
    <style>
        :root { --gold: #D4AF37; --deep-red: #660000; }
        body { background: #000; color: #fff; font-family: 'Tiro Devanagari Hindi', serif; }
        
        /* Hero Video Background */
        .hero {
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-attachment: fixed;
        }
        
        .hero-text h1 { font-family: 'Cinzel', serif; font-size: 5.5rem; color: var(--gold); text-shadow: 0 0 30px rgba(212,175,55,0.6); }
        
        /* Premium Event Cards */
        .event-grid { padding: 80px 0; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .event-card {
            height: 400px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.3);
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 30px; text-decoration: none; color: white; overflow: hidden;
            position: relative; margin-bottom: 30px;
        }
        .event-card:hover { transform: translateY(-20px) scale(1.02); border-color: var(--gold); box-shadow: 0 20px 50px rgba(212,175,55,0.2); }
        .event-card h3 { font-size: 2.2rem; color: var(--gold); z-index: 2; }
        .card-num { font-size: 6rem; position: absolute; top: -10px; right: 10px; opacity: 0.1; font-family: 'Cinzel'; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-text text-center" data-aos="zoom-out">
            <p style="letter-spacing: 10px;">शुभ विवाह</p>
            <h1>राहुल ❤️ अंजली</h1>
            <p class="mt-3">२४ दिसंबर २०२६ • उज्जैन की पावन धरा पर</p>
        </div>
    </section>

    <div class="event-grid">
        <div class="container">
            <h2 class="text-center mb-5" style="font-family: 'Cinzel'; color: var(--gold);">The Wedding Chapters</h2>
            <div class="row">
                <div class="col-md-4" data-aos="fade-up">
                    <a href="ganesh.html" class="event-card">
                        <div class="card-num">01</div>
                        <h3>गणेश पूजन</h3>
                        <p>विघ्नहर्ता का प्रथम निमंत्रण</p>
                    </a>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="100">
                    <a href="haldi.html" class="event-card">
                        <div class="card-num">02</div>
                        <h3>हल्दी उत्सव</h3>
                        <p>रंग पीला, स्नेह निराला</p>
                    </a>
                </div>
                <div class="col-md-4" data-aos="fade-up" data-aos-delay="200">
                    <a href="lagan.html" class="event-card">
                        <div class="card-num">06</div>
                        <h3>शुभ लग्न</h3>
                        <p>अटूट सात वचन और फेरे</p>
                    </a>
                </div>
            </div>
            </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
